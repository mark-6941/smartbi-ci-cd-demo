name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      K8S_NAMESPACE: smartbi
      HELM_RELEASE_NAME: smartbi-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Prepare kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        shell: bash
        run: |
          kubectl version --client
          kubectl get ns

      - name: Helm lint
        run: |
          helm lint ./charts/smartbi-app

      - name: Deploy with Helm
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" ./charts/smartbi-app \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f ./charts/smartbi-app/values.yaml \
            -f ./charts/smartbi-app/values-dev.yaml \
            --set env.SmartBI__BaseUrl="${{ secrets.SMARTBI_BASE_URL }}" \
            --set env.SmartQuery__Endpoint="${{ secrets.SMARTQUERY_ENDPOINT }}"

      - name: Check resources
        shell: bash
        run: |
          kubectl get pods -n "$K8S_NAMESPACE" || true
          kubectl get deploy -n "$K8S_NAMESPACE" || true
          kubectl get svc -n "$K8S_NAMESPACE" || true
          kubectl get ingress -n "$K8S_NAMESPACE" || true

      - name: Smoke test
        shell: bash
        run: |
          if kubectl get deployment "$HELM_RELEASE_NAME" -n "$K8S_NAMESPACE" >/dev/null 2>&1; then
            kubectl rollout status deployment/"$HELM_RELEASE_NAME" -n "$K8S_NAMESPACE" --timeout=180s
          else
            echo "Deployment $HELM_RELEASE_NAME not found in namespace $K8S_NAMESPACE"
            echo "Available deployments:"
            kubectl get deployment -n "$K8S_NAMESPACE" || true
            exit 1
          fi

