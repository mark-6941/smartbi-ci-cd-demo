name: SmartBI Integrated CI/CD Pipeline

on:
  push:
    branches:
      - main  # 只有在正式合併到 main 時才觸發

permissions:
  contents: read     
  packages: write

env:
  # K8S / Container 全域變數
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/smartbi-api
  K8S_NAMESPACE: smartbi
  HELM_RELEASE_NAME: smartbi-app

  #  Windows IIS & SQL Server 全域變數
  BI_DEPT_NO: "T001"
  BI_DB_HOST: "192.168.1.102"
  BI_DB_NAME: "SmartBi_DB"
  BI_IIS_SITE_NAME: "SmartBI_Core_API"

jobs:
  # ==========================================
  # JOB 1: 負責雲端/容器化 K8S 叢集部署
  # ==========================================
  build-and-deploy-k8s:
    runs-on: ubuntu-latest
    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name:  Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name:  Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name:  Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🛠️ 【修正：強制指定 -f net8.0】確保建置出來的專案與 Docker 內的 .NET 8 SDK 完美相容
      - name: 📝 動態建置測試專案檔案 (防禦路徑檢查衝突)
        run: |
          echo "======== [SmartBI] 正在動態建立環境防禦檔案 ========"
          if [ ! -f *.sln ] && [ ! -f *.csproj ]; then
            dotnet new webapi -n FakeSmartBiProject -f net8.0 --force
            dotnet new sln -n SmartBiFakeSolution --force
            dotnet sln SmartBiFakeSolution.sln add FakeSmartBiProject/FakeSmartBiProject.csproj
            echo "✅ 臨時測試檔案建置完成，已鎖定 .NET 8.0 目標框架。"
          else
            echo "ℹ️ 根目錄已存在專案檔，跳過建立。"
          fi

      - name:  Build image
        run: |
          docker build -t $IMAGE_REPOSITORY:${{ github.sha }} .
          docker tag $IMAGE_REPOSITORY:${{ github.sha }} $IMAGE_REPOSITORY:latest

      - name: Push image
        run: |
          docker push $IMAGE_REPOSITORY:${{ github.sha }}
          docker push $IMAGE_REPOSITORY:latest

      - name:  Prepare kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install $HELM_RELEASE_NAME ./charts/smartbi-app \
            --namespace $K8S_NAMESPACE \
            --create-namespace \
            -f ./charts/smartbi-app/values.yaml \
            -f ./charts/smartbi-app/values-dev.yaml \
            --set image.repository=$IMAGE_REPOSITORY \
            --set image.tag=${{ github.sha }} \
            --set env.SmartBI__BaseUrl="${{ secrets.SMARTBI_BASE_URL }}" \
            --set env.SmartQuery__Endpoint="${{ secrets.SMARTQUERY_ENDPOINT }}"

      - name: 🩺 Smoke test
        shell: bash
        run: |
          kubectl rollout status deployment/$HELM_RELEASE_NAME -n $K8S_NAMESPACE --timeout=180s

  # ==========================================
  # JOB 2: 負責本機實體環境 (SQL Server SP / IIS 變數)
  # ==========================================
  database-and-iis-migration:
    runs-on: windows-latest  # 指定 Windows Runner 確保 PowerShell 與實體環境相容
    steps:
      - name:  
        uses: actions/checkout@v4

      # 🛠️ 本機 Windows 端同步修正框架為 net8.0
      - name: 📝 本機端動態建置測試專案檔案
        shell: bash
        run: |
          if [ ! -f *.sln ] && [ ! -f *.csproj ]; then
            dotnet new webapi -n FakeSmartBiProject -f net8.0 --force
            dotnet new sln -n SmartBiFakeSolution --force
            dotnet sln SmartBiFakeSolution.sln add FakeSmartBiProject/FakeSmartBiProject.csproj
          fi

      - name: 還原與編譯 .NET Core 專案
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: 執行預存程序更新與 IIS 站台部署
        shell: powershell
        run: |
          # 呼叫本機自動化腳本，將 yml 定義的變數與 iusu 參數安全帶入
          ./scripts/deploy-helper.ps1 `
            -DbHost "${{ env.BI_DB_HOST }}" `
            -DbName "${{ env.BI_DB_NAME }}" `
            -SiteName "${{ env.BI_IIS_SITE_NAME }}" `
            -DeptNo "${{ env.BI_DEPT_NO }}" `
            -iusu "true"
