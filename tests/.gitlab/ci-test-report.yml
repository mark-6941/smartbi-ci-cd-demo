stages:
  # - build
  - test
  # - deploy
  - report

variables:
  PUBLISH_DIR: "$CI_PROJECT_DIR/publish"
  IIS_SITE_NAME: "Default Web Site"
  IIS_APP_POOL: "testcicd"
  DEPLOY_PATH: "C:/inetpub/wwwroot/testcicd"
  APP_PORT: "8080"

