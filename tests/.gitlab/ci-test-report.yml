# ── Test ───────────────────────────────────────────────────────────────────────
run-tests:
  stage: test
  tags:
    - shared-shell
  script:
    - dotnet restore
    - dotnet test --no-restore --verbosity normal --logger "junit;LogFilePath=test-results.xml"
  artifacts:
    when: always
    reports:
      junit: "**/test-results.xml"
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

