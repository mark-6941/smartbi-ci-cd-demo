# ── CI Failure Issue ──────────────────────────────────────────────────────────
# develop 分支 pipeline 失敗時，自動開立 GitLab Issue 並指派給 commit 作者
notify-failure-issue:
  stage: report
  tags:
    - shared-shell
  script:
    - |
      ISSUE_TITLE="CI Failure: [${CI_COMMIT_BRANCH}] ${CI_COMMIT_SHORT_SHA}"
      TODAY=$(date '+%Y-%m-%d')
      TIME_NOW=$(date '+%Y-%m-%d %H:%M:%S')

      AUTHOR_EMAIL=$(echo "$CI_COMMIT_AUTHOR" | grep -oP '(?<=<)[^>]+(?=>)' || true)
      AUTHOR_ID=""
      if [ -n "$AUTHOR_EMAIL" ]; then
        AUTHOR_ID=$(curl --silent \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          "${CI_API_V4_URL}/users?search=${AUTHOR_EMAIL}" \
          | grep -oP '"id":\\K\\d+' | head -1 || true)
      fi

      EXISTING_ISSUE=$(curl --silent \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues?labels=ci-failure&state=opened&search=${CI_COMMIT_BRANCH}" \
        | grep -oP '"iid":\\K\\d+' | head -1 || true)

      if [ -n "$EXISTING_ISSUE" ]; then
        echo "Open ci-failure issue #${EXISTING_ISSUE} already exists for branch ${CI_COMMIT_BRANCH}, adding comment."
        curl --silent --request POST \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"body\": \"New failure on commit \`${CI_COMMIT_SHORT_SHA}\` at ${TIME_NOW}. Pipeline: [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues/${EXISTING_ISSUE}/notes"
      else
        ISSUE_BODY="## CI Pipeline Failed

- **Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})
- **Branch:** \`${CI_COMMIT_BRANCH}\`
- **Commit:** \`${CI_COMMIT_SHORT_SHA}\` ${CI_COMMIT_TITLE}
- **Author:** ${CI_COMMIT_AUTHOR}
- **Time:** ${TIME_NOW}

Please investigate and close this issue once resolved."

        if [ -n "$AUTHOR_ID" ]; then
          PAYLOAD="{\"title\": \"${ISSUE_TITLE}\", \"description\": \"${ISSUE_BODY}\", \"labels\": \"ci-failure,priority::high\", \"due_date\": \"${TODAY}\", \"assignee_ids\": [${AUTHOR_ID}]}"
        else
          PAYLOAD="{\"title\": \"${ISSUE_TITLE}\", \"description\": \"${ISSUE_BODY}\", \"labels\": \"ci-failure,priority::high\", \"due_date\": \"${TODAY}\"}"
        fi

        ISSUE_RESPONSE=$(curl --silent --show-error \
          --request POST \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$PAYLOAD" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues")

        ISSUE_IID=$(echo "$ISSUE_RESPONSE" | grep -oP '"iid":\\K\\d+' | head -1 || true)
        if [ -n "$ISSUE_IID" ]; then
          echo "Issue created: ${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/issues/${ISSUE_IID}"
        else
          echo "Warning: Issue creation may have failed. Response: $ISSUE_RESPONSE"
        fi
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "develop"'
      when: on_failure
    - when: never

# ── CI Report Email ───────────────────────────────────────────────────────────
# develop 分支 pipeline 完成後，不論成功失敗都寄送報告信
# 失敗時信件內附失敗 job 的最後 50 行 log
# 收件人清單維護：.gitlab/oncall-map.sh
notify-email:
  stage: report
  tags:
    - shared-shell
  script:
    - |
      source .gitlab/oncall-map.sh
      REPORT_EMAIL_TO=$(get_oncall_emails | tr '\n' ',' | sed 's/,$//')
      export REPORT_EMAIL_TO

      if [ -z "$REPORT_EMAIL_TO" ]; then
        echo "No oncall emails configured, skipping notification"
        exit 0
      fi

      echo "Sending CI report to: $REPORT_EMAIL_TO"
      python3 .gitlab/ci-report.py || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "develop"'
      when: always
    - when: never
